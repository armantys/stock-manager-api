version: '3.8'

services:
  database:
    image: mysql:8.0
    container_name: stock_manager_db
    restart: always
    environment:
      MYSQL_DATABASE: stock_manager_api
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: root
      MYSQL_PASSWORD: 
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
